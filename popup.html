<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      font-family: Arial, sans-serif;
      padding: 10px;
      margin: 0;
      background-color: #0c0c0c; /* Amoled Black */
      color: #ffffff;
    }
    h3 { margin-top: 0; color: #00ff66; } /* Accent Green */
    .video-box {
      border: 1px solid #333;
      padding: 8px;
      border-radius: 4px;
      background: #161616;
      word-break: break-all;
      margin-bottom: 10px;
      font-size: 12px;
    }
    button {
      width: 100%;
      background-color: #00ff66;
      color: #000;
      border: none;
      padding: 10px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background-color: #00cc52; }
    button:disabled { background-color: #444; color: #888; cursor: not-allowed; }
  </style>
</head>
<body>
  <h3>Koofr Video Grabber</h3>
  <div id="status">No video detected playing yet.</div>
  <div id="video-info" class="video-box" style="display:none;">
    <strong>File:</strong> <span id="filename"></span>
  </div>
  <button id="upload-btn" disabled>Upload directly to Koofr</button>

  <script src="popup.js"></script>
</body>
</html>
