<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: 'Segoe UI', Arial, sans-serif; padding: 12px; margin: 0; background: #fdfdfd; }
    h3 { margin: 0 0 10px 0; color: #222; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
    .section { margin-bottom: 15px; }
    label { font-size: 11px; color: #555; display: block; margin-top: 5px; }
    input { width: 100%; padding: 6px; box-sizing: border-box; margin-top: 3px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
    
    .btn { background: #1e88e5; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 13px; margin-top: 8px; }
    .btn:hover { background: #1565c0; }
    
    .video-item { background: #f1f3f4; border: 1px solid #dadce0; border-radius: 6px; padding: 8px; margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .video-url { font-size: 11px; color: #555; word-break: break-all; max-height: 40px; overflow: hidden; text-overflow: ellipsis; }
    
    .status { font-size: 12px; font-weight: bold; text-align: center; margin-top: 5px; }
    .success { color: #2e7d32; }
    .error { color: #c62828; }
    .info { color: #1565c0; }
    
    .cred-toggle { font-size: 11px; color: #1e88e5; cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; }
  </style>
</head>
<body>

  <h3>📥 Koofr Video Grabber</h3>
  
  <div class="section">
    <div id="videoList">
      <div class="status info">Scanning page for videos...</div>
    </div>
  </div>

  <span class="cred-toggle" id="toggleCreds">Show/Hide Accounts Settings</span>
  <div id="credSection" style="display: none; border-top: 1px dashed #ccc; margin-top: 10px; padding-top: 5px;">
    <label>Koofr Email Address</label>
    <input type="text" id="email" placeholder="Email Address"/>
    <label>App Password</label>
    <input type="password" id="pass" placeholder="App Password"/>
    <button class="btn" id="saveBtn" style="font-size:11px; padding:4px;">Update Account Details</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
