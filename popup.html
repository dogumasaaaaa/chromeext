<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; font-family: Arial, sans-serif; padding: 10px; margin: 0; }
    h3 { margin-top: 0; color: #333; }
    label { font-size: 11px; color: #666; display: block; margin-top: 8px; }
    input { width: 100%; padding: 6px; box-sizing: border-box; margin-top: 3px; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; margin-top: 12px; background: #1e88e5; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #1565c0; }
    .status { font-size: 11px; text-align: center; color: green; margin-top: 5px; }
  </style>
</head>
<body>
  <h3>WebDAV Settings</h3>
  <label>Koofr Email Address</label>
  <input type="text" id="email" placeholder="lo.t.st.upidk..."/>
  
  <label>App Password</label>
  <input type="password" id="pass" placeholder="••••••••••••••••"/>
  
  <button id="saveBtn">Save Credentials</button>
  <div class="status" id="status"></div>

  <script>
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('pass');
    const saveBtn = document.getElementById('saveBtn');
    const status = document.getElementById('status');

    // Load saved or display placeholder defaults
    chrome.storage.local.get(['email', 'appPass'], (res) => {
      if (res.email) emailInput.value = res.email;
      if (res.appPass) passInput.value = res.appPass;
    });

    saveBtn.addEventListener('click', () => {
      chrome.storage.local.set({
        email: emailInput.value.trim(),
        appPass: passInput.value.trim()
      }, () => {
        status.innerText = "Credentials saved successfully!";
        setTimeout(() => status.innerText = "", 2000);
      });
    });
  </script>
</body>
</html>
